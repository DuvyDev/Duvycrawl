  # ─── Duvycrawl ───
  duvycrawl:
    build: .
    container_name: duvycrawl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    environment:
      - TZ=UTC
#      - PROXY_URL=socks5://warp:1080
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - duvycrawl

networks:
  duvycrawl:
    driver: bridge
