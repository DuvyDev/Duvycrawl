version: "3.9"

services:
  # ─── Optional: Cloudflare Warp SOCKS5 proxy ───
  # Uncomment this service and set proxy_url: "socks5h://warp:1080" in
  # configs/default.yaml to route all crawler traffic through Cloudflare Warp.
  #
  # warp:
  #   image: caomingjun/warp-cli:latest
  #   container_name: duvycrawl-warp
  #   restart: unless-stopped
  #   cap_add:
  #     - NET_ADMIN
  #     - SYS_ADMIN
  #   sysctls:
  #     - net.ipv6.conf.all.disable_ipv6=0
  #     - net.ipv4.conf.all.src_valid_mark=1
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   environment:
  #     - WARP_SLEEP=5
  #   healthcheck:
  #     test: ["CMD", "curl", "-fsS", "https://1.1.1.1/help"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   networks:
  #     - duvycrawl

  # ─── Duvycrawl ───
  duvycrawl:
    build: .
    container_name: duvycrawl
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs:ro
    environment:
      - TZ=UTC
    # If using the Warp proxy, uncomment the depends_on and network_mode lines:
    # depends_on:
    #   warp:
    #     condition: service_healthy
    # network_mode: service:warp
    networks:
      - duvycrawl
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

networks:
  duvycrawl:
    driver: bridge
