# Duvycrawl Configuration
# ========================

crawler:
  # Number of concurrent crawl workers
  workers: 300
  # Maximum link depth to follow from seed pages
  max_depth: 3
  # Maximum link depth to follow for URLs enqueued via the API.
  # This acts as a relative limit: if max_depth is 3 and api_max_depth is 2,
  # API URLs start at depth 1, effectively crawling 1 level less than seeds.
  api_max_depth: 2
  # HTTP request timeout per page
  request_timeout: 15s
  # Minimum delay between requests to the same domain
  politeness_delay: 1s
  # Extra randomized duration added to politeness_delay (e.g. 500ms)
  # This makes crawl patterns less predictable and helps avoid blocks.
  random_delay: 1000ms
  # Maximum retry attempts for failed requests
  max_retries: 2
  # User-Agent string sent with every request.
  # Must match a real browser UA for anti-bot bypass.
  # DO NOT use bot-like identifiers (Googlebot, crawler, etc.).
  # NOTE: Some WAFs block macOS UAs while allowing Windows ones. If you see
  # unexpected 403s, try switching to a current Windows Chrome UA.
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/148.0.0.0 Safari/537.36"
  # Maximum page size to download (in KB)
  max_page_size_kb: 512
  # Whether to respect robots.txt directives
  respect_robots: false
  # Max concurrent requests to the SAME domain (like Colly's Parallelism).
  # Higher = faster for a single domain, but be polite. Default: 2.
  parallelism_per_domain: 8
  # Disable cookie handling. Leave false unless you specifically want
  # to avoid session cookies (most sites require cookies to work).
  disable_cookies: false
  # Max idle keep-alive connections per host. Increase for high throughput
  # when crawling the same domains repeatedly.
  max_idle_conns_per_host: 100
  # Proxy configuration.
  # Supports: http://, https://, socks5://, socks5h://
  # WARP example: socks5://warp:1080
  # The crawler prioritizes them in order and automatically fails over.
  # Use "direct" as an entry to allow non-proxied connections.
  proxy_urls:
    - "socks5://warp:1080"
    - "direct"
  # How often the background health monitor checks proxies.
  proxy_check_interval: 60s
  # How often per-domain crawl statistics are flushed from memory to SQLite.
  # Shorter intervals = fresher stats but more DB writes.
  # Longer intervals = fewer writes but possible data loss on crash.
  domain_stats_flush_interval: 30s
  # Whether to start crawling automatically on launch.
  # Set to false to start via API: POST /api/v1/crawler/start
  auto_start: true
  # Domains that the crawler is allowed to index, but will NOT extract or enqueue
  # outgoing links from. Treats the domain as a leaf node to prevent getting stuck.
  # Subdomains are handled automatically (e.g., "wikipedia.org" covers "es.wikipedia.org").
  no_follow_domains:
    - "wikipedia.org"
  # Scoring strategy for the URL frontier.
  #   static   — legacy priority-based (BFS-like)
  #   adaptive — A*-like best-first that learns from your searches and clicks
  scoring_strategy: adaptive
  # Parameters for the adaptive scorer.
  adaptive:
    min_queries_before_boost: 3
    depth_penalty_k: 12.0
    profile_refresh_interval: 60s
    seed_bonus: 50.0
    anchor_weight: 40.0
    url_path_weight: 30.0
    source_title_weight: 20.0
    domain_reputation_weight: 15.0
    language_match_bonus: 35.0
    # Manual interest terms that boost the adaptive scorer from startup.
    # These activate the A* heuristic immediately, without requiring prior searches.
    # Weight is cumulative: adding it again on restart will increase the total.
    interests:
      - term: "uruguay"
        weight: 5.0
      - term: "montevideo"
        weight: 5.0
      - term: "coding"
        weight: 5.0
      - term: "golang"
        weight: 5.0
      - term: "python"
        weight: 5.0
      - term: "warframe"
        weight: 5.0
      - term: "destiny"
        weight: 5.0

  # Scheduler controls how often seed URLs are re-crawled.
  scheduler:
    tick_interval: 10m
    seed_recrawl_interval: 24h

# Optional JavaScript rendering fallback.
# Keep disabled by default: regular HTTP crawling is much cheaper and remains
# the primary path. Enable only when you also provide a local Chromium/Chrome
# executable or a remote CDP endpoint such as a browser sidecar in Docker.
rendering:
  enabled: true
  # auto = render only weak HTTP results, force = render all HTML, disabled = off
  mode: auto
  # Docker sidecar example: ws://browser:3000
  browser_ws_url: "ws://browser:3000"
  # Local dev override, e.g. C:\Program Files\Google\Chrome\Application\chrome.exe
  executable_path: ""
  max_concurrency: 2
  # Max time a crawler worker waits for a free Chromium slot before deferring.
  acquire_timeout: 500ms
  timeout: 20s
  # Browser-saturated jobs are requeued with attempt * base_delay, capped here.
  busy_retry_max_attempts: 3
  busy_retry_base_delay: 2s
  busy_retry_max_delay: 15s
  wait_after_load: 1200ms
  max_html_size_kb: 2048
  min_text_chars: 200
  min_links: 1
  render_on_status_codes: [403, 503]
  block_images: true

# Search scoring boosts applied when the user provides a lang parameter.
# These are critical for multilingual sites where the same domain has
# pages in many languages (e.g. warframe.com/en, warframe.com/es).
scoring:
  # Boost added to a result when its detected language matches the search lang.
  # This needs to be high enough to overcome domain-match and platform-intent
  # boosts (which can be 8000-16000). Default: 3000.
  language_boost: 3000.0
  # Boost added to English results when the user searches in a non-English
  # language. English acts as the universal fallback. Default: 1500.
  secondary_language_boost: 1500.0
  # The language code used as the secondary fallback. Default: "en".
  secondary_language: "en"

storage:
  # Directory to store the SQLite database files (content.db, crawler.db, graph.db)
  db_path: "./data"

api:
  # Host to bind the API server
  host: "0.0.0.0"
  # Port for the API server
  port: 8080

logging:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: text (human-readable) or json (machine-readable)
  format: "text"

embedder:
  # Enable or disable semantic embeddings generation and search re-ranking.
  # Set to true only if you have Ollama running and the model pulled.
  enabled: true
  # Base URL for the Ollama embeddings API
  url: "http://localhost:11434"
  # The semantic embedding model to use
  model: "all-minilm:l6-v2"
  # Number of concurrent workers sending documents to Ollama
  workers: 2

search_intents:
  site_types: ["wiki", "blog", "docs", "forum", "forums", "foro", "tienda", "store", "info", "guia", "guias", "guide", "guides", "noticias", "news", "comunidad", "community", "api", "documentacion", "documentation", "soporte", "support", "ayuda", "help", "portal", "hub", "status"]
  platform_domains: ["reddit", "youtube", "github", "twitter", "x", "facebook", "instagram", "tiktok", "linkedin", "pinterest", "twitch", "discord", "netflix", "spotify", "steam", "epicgames", "medium", "substack", "patreon", "kickstarter", "indiegogo", "vimeo", "dailymotion", "tumblr", "quora", "stackexchange", "stackoverflow", "gitlab", "bitbucket", "sourceforge", "itchio", "deviantart", "artstation", "behance", "dribbble", "soundcloud", "bandcamp", "mixcloud", "audiomack", "goodreads", "wattpad", "fanfiction", "ao3", "imgur", "gfycat", "tenor", "giphy", "pastebin", "hastebin", "jsfiddle", "codepen", "replit", "glitch", "heroku", "vercel", "netlify", "wordpress", "blogger", "wix", "squarespace", "weebly", "shopify", "etsy", "amazon", "aliexpress", "ebay", "mercadolibre", "newegg", "bestbuy", "walmart", "target", "wikipedia", "npm", "pypi", "docker", "nuget"]
