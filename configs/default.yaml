# Duvycrawl Configuration
# ========================

crawler:
  # Number of concurrent crawl workers
  workers: 100
  # Maximum link depth to follow from seed pages
  max_depth: 1
  # HTTP request timeout per page
  request_timeout: 10s
  # Minimum delay between requests to the same domain
  politeness_delay: 1s
  # Maximum retry attempts for failed requests
  max_retries: 3
  # User-Agent string sent with every request
  #user_agent: "Duvycrawl/1.0 (+https://github.com/DuvyDev/Duvycrawl)"
  user_agent: "Mozilla/5.0 (compatible; Googlebot/2.1; +http://www.google.com/bot.html)"
  # Maximum page size to download (in KB)
  max_page_size_kb: 1024
  # Whether to respect robots.txt directives
  respect_robots: false
  # If true, ONLY crawl pages within seed domains.
  # If false, follow links freely across the entire web.
  seed_domains_only: false

storage:
  # Path to the SQLite database file
  db_path: "./data/duvycrawl.db"

api:
  # Host to bind the API server
  host: "0.0.0.0"
  # Port for the API server
  port: 8080

logging:
  # Log level: debug, info, warn, error
  level: "info"
  # Log format: text (human-readable) or json (machine-readable)
  format: "text"

# ========================
# Seed Domains
# ========================
# Priority domains that get crawled first and re-crawled more frequently.
# You can add, remove, or reorder seeds freely.
#
# Fields:
#   domain:     The domain name (required)
#   priority:   Crawl priority, higher = sooner (default: 100)
#   start_urls: Initial pages to crawl (default: ["https://<domain>/"])
#
# If this section is omitted entirely, a built-in default list is used.

seeds:
  # --- Social & Community ---
  - domain: reddit.com
    priority: 100
    start_urls:
      - https://www.reddit.com/
      - https://www.reddit.com/r/popular/

  - domain: twitter.com
